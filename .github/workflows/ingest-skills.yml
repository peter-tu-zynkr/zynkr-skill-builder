name: Ingest skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Run ingest
        working-directory: scripts
        run: npx tsx ingest.ts "$GITHUB_WORKSPACE/skills"

      - name: Run build-marketplace
        working-directory: scripts
        run: npx tsx build-marketplace.ts

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ generated/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: auto-ingest skills"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Vercel sync
        if: steps.commit.outputs.changed == 'true'
        env:
          SYNC_SECRET: ${{ secrets.SKILLS_SYNC_HMAC_SECRET }}
          SOURCE_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          if [ -z "$SYNC_SECRET" ]; then
            echo "SKILLS_SYNC_HMAC_SECRET not set — skipping webhook"
            exit 0
          fi
          BODY_FILE=generated/skills-detail.json
          if [ ! -f "$BODY_FILE" ]; then
            echo "Expected $BODY_FILE not found — skipping webhook"
            exit 0
          fi
          SIG=$(openssl dgst -sha256 -hmac "$SYNC_SECRET" < "$BODY_FILE" | awk '{print $NF}')
          curl -fsSL -X POST https://zynkr.ai/api/skills/sync \
            -H "Content-Type: application/json" \
            -H "X-Zynkr-Signature: $SIG" \
            -H "X-Zynkr-Source-Sha: $SOURCE_SHA" \
            --data-binary @"$BODY_FILE"
