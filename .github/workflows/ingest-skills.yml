name: Ingest skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Run ingest
        working-directory: scripts
        run: npx tsx ingest.ts "$GITHUB_WORKSPACE/skills"

      - name: Run build-marketplace
        working-directory: scripts
        run: npx tsx build-marketplace.ts

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ generated/ frontend/lib/generated-skills.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-ingest skills"
            git push
          fi
