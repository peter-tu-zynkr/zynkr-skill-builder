name: Ingest skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      # Last-resort QA backstop: catches ERROR-tier skills that reached main
      # without a PR (direct push / admin force-merge). Only the SKILL.md files
      # changed in THIS push are checked, so pre-existing issues in untouched
      # skills never block an unrelated ingest. The auto-ingest commit below
      # only touches content/ + generated/, so it never re-triggers this gate.
      - name: QA gate on changed skills (aborts ingest on ERROR)
        working-directory: scripts
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE" 2>/dev/null || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            RANGE="HEAD~1 HEAD"
          else
            RANGE="$BEFORE ${{ github.sha }}"
          fi
          FILES=$(git diff --name-only $RANGE -- 'skills/**/SKILL.md' | grep -v '/.claude/skills/' || true)
          if [ -z "$FILES" ]; then echo "No changed SKILL.md in this push — skipping QA."; exit 0; fi
          echo "QA-checking changed skills:"; echo "$FILES"
          fail=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "::group::QA $f"
            npx tsx validate-skill.ts "../$f" --tier=all --github || fail=1
            echo "::endgroup::"
          done <<< "$FILES"
          if [ "$fail" -ne 0 ]; then echo "::error::QA failed on a changed skill — aborting ingest."; exit 1; fi

      - name: Run ingest
        working-directory: scripts
        run: npx tsx ingest.ts "$GITHUB_WORKSPACE/skills"

      - name: Run build-marketplace
        working-directory: scripts
        run: npx tsx build-marketplace.ts

      - name: Run build-taxonomy-tree
        working-directory: scripts
        run: npx tsx build-taxonomy-tree.ts

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ generated/ skills/README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: auto-ingest skills"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Vercel sync
        # Fire whenever generated/skills-detail.json exists. Sync is idempotent
        # (the webhook does upsert), so re-posting the same payload is safe.
        # Gating only on `changed==true` from the commit step misses cases where
        # the human committer already regenerated content/ + generated/ locally
        # — CI then sees no commit-time diff and would skip sync, leaving the
        # Supabase mirror stale.
        env:
          SYNC_SECRET: ${{ secrets.SKILLS_SYNC_HMAC_SECRET }}
          SOURCE_SHA: ${{ steps.commit.outputs.sha || github.sha }}
        run: |
          if [ -z "$SYNC_SECRET" ]; then
            echo "SKILLS_SYNC_HMAC_SECRET not set — skipping webhook"
            exit 0
          fi
          BODY_FILE=generated/skills-detail.json
          if [ ! -f "$BODY_FILE" ]; then
            echo "Expected $BODY_FILE not found — skipping webhook"
            exit 0
          fi
          SIG=$(openssl dgst -sha256 -hmac "$SYNC_SECRET" < "$BODY_FILE" | awk '{print $NF}')
          curl -fsSL -X POST https://zynkr.ai/api/skills/sync \
            -H "Content-Type: application/json" \
            -H "X-Zynkr-Signature: $SIG" \
            -H "X-Zynkr-Source-Sha: $SOURCE_SHA" \
            --data-binary @"$BODY_FILE"
