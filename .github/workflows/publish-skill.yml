name: Publish authored skill

# Sibling of pickup-approved-issue.yml.
#
# Fired by /skill-publish via repository_dispatch (event_type: skill-publish-request)
# whenever a user-authored skill is ready to land in this repo. The dispatch
# carries one of:
#   - skill_md_url   — URL to fetch a single SKILL.md from
#   - skill_md_b64   — inline base64 of a single SKILL.md
#   - bundle_b64     — inline base64 of a gzipped tarball containing the whole
#                      skill folder (SKILL.md + references/ + scripts/ + assets/)
# The workflow lands the file(s) at skills/<N-category>/<slug>/, validates,
# pushes a branch, and opens a PR linked back to the source issue.
#
# Also manually invocable via "Run workflow" with the same inputs — useful for
# local testing or rerunning after a payload error.

on:
  repository_dispatch:
    types: [skill-publish-request]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number in the idea repo'
        required: true
      issue_repo:
        description: 'Issue repo (owner/name)'
        required: false
        default: 'peter-tu-zynkr/zynkr-skill-idea'
      slug:
        description: 'Skill slug (kebab-case)'
        required: true
      category:
        description: 'Category — digit 0-9 or slug (engineer, strategy, ...)'
        required: true
      skill_md_url:
        description: 'URL of the authored SKILL.md (raw or blob). Single-file mode.'
        required: false
      skill_md_b64:
        description: 'Inline base64-encoded SKILL.md content. Single-file mode.'
        required: false
      bundle_b64:
        description: 'Inline base64-encoded gzipped tarball of the whole skill folder. Multi-file mode (SKILL.md + references/ + scripts/ + assets/). Build with: tar -czf - -C <parent> <slug>/ | base64. Provide exactly one of skill_md_url, skill_md_b64, or bundle_b64.'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Resolve payload
        id: payload
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "issue_number=${{ github.event.client_payload.issue_number }}" >> "$GITHUB_OUTPUT"
            echo "issue_repo=${{ github.event.client_payload.issue_repo }}" >> "$GITHUB_OUTPUT"
            echo "slug=${{ github.event.client_payload.slug }}" >> "$GITHUB_OUTPUT"
            echo "category=${{ github.event.client_payload.category }}" >> "$GITHUB_OUTPUT"
            echo "skill_md_url=${{ github.event.client_payload.skill_md_url }}" >> "$GITHUB_OUTPUT"
            # skill_md_b64 and bundle_b64 may be long — write to files to avoid env-var size limits and shell quoting headaches.
            printf '%s' "${{ github.event.client_payload.skill_md_b64 }}" > /tmp/skill_md.b64
            printf '%s' "${{ github.event.client_payload.bundle_b64 }}" > /tmp/bundle.b64
          else
            echo "issue_number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
            echo "issue_repo=${{ inputs.issue_repo }}" >> "$GITHUB_OUTPUT"
            echo "slug=${{ inputs.slug }}" >> "$GITHUB_OUTPUT"
            echo "category=${{ inputs.category }}" >> "$GITHUB_OUTPUT"
            echo "skill_md_url=${{ inputs.skill_md_url }}" >> "$GITHUB_OUTPUT"
            printf '%s' "${{ inputs.skill_md_b64 }}" > /tmp/skill_md.b64
            printf '%s' "${{ inputs.bundle_b64 }}" > /tmp/bundle.b64
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Land the authored SKILL.md
        id: publish
        env:
          # SKILL_IDEA_PAT lets the script read from the private idea repo if it ever needs to.
          # Default GITHUB_TOKEN is fine for the workflow's own writes.
          GH_TOKEN: ${{ secrets.SKILL_IDEA_PAT || secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.payload.outputs.issue_number }}
          ISSUE_REPO: ${{ steps.payload.outputs.issue_repo }}
          SLUG: ${{ steps.payload.outputs.slug }}
          CATEGORY: ${{ steps.payload.outputs.category }}
          SKILL_MD_URL: ${{ steps.payload.outputs.skill_md_url }}
        working-directory: scripts
        run: |
          set -euo pipefail
          # Read b64 inputs from files the previous step wrote (empty file = "not provided").
          if [ -s /tmp/skill_md.b64 ]; then
            export SKILL_MD_B64="$(cat /tmp/skill_md.b64)"
          fi
          if [ -s /tmp/bundle.b64 ]; then
            export BUNDLE_B64="$(cat /tmp/bundle.b64)"
          fi
          OUT=$(npx tsx publish-skill.ts | tail -n1)
          echo "skill_path=$OUT" >> "$GITHUB_OUTPUT"
          # Derive the skill folder from the SKILL.md path so the commit step can
          # add the whole tree (matters in bundle mode where references/ landed too).
          echo "skill_dir=$(dirname "$OUT")" >> "$GITHUB_OUTPUT"

      - name: Validate + QA (blocks PR on ERROR-tier findings)
        working-directory: scripts
        run: npx tsx validate-skill.ts "../${{ steps.publish.outputs.skill_path }}" --tier=all --github

      - name: Create branch, commit, push
        id: push
        env:
          SLUG: ${{ steps.payload.outputs.slug }}
          SKILL_PATH: ${{ steps.publish.outputs.skill_path }}
          SKILL_DIR: ${{ steps.publish.outputs.skill_dir }}
          ISSUE_NUMBER: ${{ steps.payload.outputs.issue_number }}
          ISSUE_REPO: ${{ steps.payload.outputs.issue_repo }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="skill/${SLUG}"
          git checkout -b "$BRANCH"
          # Add the whole skill folder — single-file mode only contains SKILL.md
          # here, but bundle mode also brings references/, scripts/, assets/.
          git add "$SKILL_DIR"
          git commit -m "publish: ${SLUG} from ${ISSUE_REPO}#${ISSUE_NUMBER}"
          git push -u origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.push.outputs.branch }}
          SLUG: ${{ steps.payload.outputs.slug }}
          ISSUE_NUMBER: ${{ steps.payload.outputs.issue_number }}
          ISSUE_REPO: ${{ steps.payload.outputs.issue_repo }}
          SKILL_PATH: ${{ steps.publish.outputs.skill_path }}
        run: |
          set -euo pipefail
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "publish(${SLUG}): from ${ISSUE_REPO}#${ISSUE_NUMBER}" \
            --body "Auto-published by \`publish-skill\` from [${ISSUE_REPO}#${ISSUE_NUMBER}](https://github.com/${ISSUE_REPO}/issues/${ISSUE_NUMBER}).

          **Skill:** \`${SKILL_PATH}\`
          **Source issue:** ${ISSUE_REPO}#${ISSUE_NUMBER}
          **Intake:** \`/skill-publish\` (user-authored SKILL.md)

          Frontmatter has been validated against the schema. Body is the author's final content — no \`<!-- TODO -->\` markers expected. Merge to trigger \`ingest-skills\` and surface the skill on the marketplace. After merge, \`/skill-triager\` will use \`confirm-ship\` to close the source issue.")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Comment back on the source issue
        # Cross-repo issue comments require a PAT (GITHUB_TOKEN is scoped to this
        # repo only). We try anyway, but treat failure as non-fatal — the real
        # work (PR opened, file landed) is already done, and /skill-publish
        # writes the same comment client-side as a fallback.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.SKILL_IDEA_PAT || secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.payload.outputs.issue_number }}
          ISSUE_REPO: ${{ steps.payload.outputs.issue_repo }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          SKILL_PATH: ${{ steps.publish.outputs.skill_path }}
        run: |
          set +e
          gh issue comment "$ISSUE_NUMBER" --repo "$ISSUE_REPO" --body "Published via \`publish-skill\` workflow.

          - **Skill path:** \`${SKILL_PATH}\`
          - **PR:** ${PR_URL}

          On merge, \`ingest-skills\` will push the artifact to the marketplace. Run \`/skill-triager\` and pick the \`confirm-ship\` branch to mark this issue \`shipped\`."
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::warning::Cross-repo comment failed (rc=$rc). The PR is open at $PR_URL — substantive work landed. Set the SKILL_IDEA_PAT secret with cross-repo issue:write to enable auto-commenting."
          fi
          exit 0
